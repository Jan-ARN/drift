<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="1200" height="150" role="img" aria-label="A comment is a promise about the code — keep it true.">
  <defs>
    <linearGradient id="fsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0F1C26"/>
      <stop offset="0.6" stop-color="#152834"/>
      <stop offset="1"   stop-color="#1C3445"/>
    </linearGradient>
    <radialGradient id="fflare" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0C880" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#F0C880" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fcomment" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F0C880" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#C79A5E" stop-opacity="0.8"/>
    </linearGradient>
    <clipPath id="fframe"><rect width="1200" height="150"/></clipPath>
  </defs>
  <g clip-path="url(#fframe)">
    <rect width="1200" height="150" fill="url(#fsky)"/>

    <!-- faint stars -->
    <g fill="#DCE6EE">
      <circle cx="180" cy="30" r="0.9" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="1010" cy="26" r="1.0" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="860" cy="34" r="0.8" opacity="0.4"/>
      <circle cx="330" cy="40" r="0.8" opacity="0.45"/>
    </g>

    <!-- small drift mark, centered above the creed: two lines from one origin, gently parting -->
    <g transform="translate(566,44)" stroke-linecap="round" fill="none">
      <line x1="0" y1="0" x2="68" y2="0" stroke="#DCE6EE" stroke-width="2" opacity="0.9"/>
      <path d="M0,0 C26,0 46,7 68,9" stroke="url(#fcomment)" stroke-width="2" opacity="0.95"/>
      <circle cx="68" cy="0" r="2" fill="#DCE6EE"/>
      <circle cx="68" cy="9" r="2" fill="#F0C880"/>
    </g>
    <g transform="translate(566,44)">
      <circle r="13" fill="url(#fflare)" opacity="0.6"/>
      <circle r="2.2" fill="#F3ECDB"/>
    </g>

    <!-- the creed -->
    <text x="600" y="96" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" letter-spacing="0.4" fill="#C5D6E2" font-style="italic">A comment is a promise about the code — keep it true.</text>

    <!-- a quiet night ridgeline -->
    <path d="M0,150 L0,134 L240,120 L470,138 L700,118 L940,136 L1160,120 L1200,128 L1200,150 Z" fill="#0F1C26" opacity="0.9"/>
  </g>
</svg>
