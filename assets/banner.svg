<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="drift — comment &amp; doc rot detection for Claude Code">
  <defs>
    <!-- dusk sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0F1C26"/>
      <stop offset="0.45" stop-color="#1C3445"/>
      <stop offset="0.78" stop-color="#2F4D63"/>
      <stop offset="1"    stop-color="#456A82"/>
    </linearGradient>
    <!-- warm setting-sun glow low on the horizon -->
    <radialGradient id="sun" cx="0.72" cy="0.92" r="0.55">
      <stop offset="0"   stop-color="#C79A5E" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#A87E54" stop-opacity="0.22"/>
      <stop offset="1"   stop-color="#A87E54" stop-opacity="0"/>
    </radialGradient>
    <!-- beacon glow at the origin, where comment and code are still in sync -->
    <radialGradient id="beaconGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0C880" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#F0C880" stop-opacity="0"/>
    </radialGradient>
    <!-- the comment line: gold, the one that drifts -->
    <linearGradient id="comment" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#F0C880" stop-opacity="0.95"/>
      <stop offset="1"   stop-color="#C79A5E" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9FBBCD" stop-opacity="0"/>
      <stop offset="1" stop-color="#9FBBCD" stop-opacity="0.16"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="300" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="300" fill="url(#sky)"/>
    <rect width="1200" height="300" fill="url(#sun)"/>

    <!-- faint stars -->
    <g fill="#DCE6EE">
      <circle cx="140" cy="48"  r="1.1" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="30"  r="0.9" opacity="0.5"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="6.5s" repeatCount="indefinite"/></circle>
      <circle cx="520" cy="58"  r="1.0" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
      <circle cx="980" cy="40"  r="1.1" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="5.8s" repeatCount="indefinite"/></circle>
      <circle cx="1090" cy="72" r="0.9" opacity="0.45"/>
      <circle cx="760" cy="34"  r="0.8" opacity="0.4"/>
    </g>

    <!-- ===== the drift motif: two lines that start true and pull apart ===== -->
    <!-- they share an origin at the beacon, then the comment peels away while the code holds its line -->
    <g stroke-linecap="round" fill="none">
      <!-- the widening gap, faintly shaded -->
      <path d="M700,150 L1150,150 L1150,204 C 980,186 860,150 700,150 Z" fill="#F0C880" opacity="0.10"/>
      <!-- code line: cream, holds straight and true -->
      <line x1="700" y1="150" x2="1150" y2="150" stroke="#DCE6EE" stroke-width="3" opacity="0.95"/>
      <!-- comment line: gold, drifts downward — the growing gap is the rot -->
      <path d="M700,150 C 860,150 980,186 1150,204" stroke="url(#comment)" stroke-width="3" opacity="0.97"/>
      <!-- end caps -->
      <circle cx="1150" cy="150" r="3" fill="#DCE6EE"/>
      <circle cx="1150" cy="204" r="3" fill="#F0C880"/>
    </g>
    <!-- beacon at the origin -->
    <g transform="translate(700,150)">
      <circle r="20" fill="url(#beaconGlow)">
        <animate attributeName="r" values="13;24;13" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" keyTimes="0;0.5;1"/>
        <animate attributeName="opacity" values="0.45;0.95;0.45" dur="3.2s" repeatCount="indefinite"/>
      </circle>
      <circle r="2.6" fill="#F3ECDB"/>
    </g>

    <!-- ridge 4: farthest, most atmospheric -->
    <path d="M0,236 L150,210 L300,232 L470,202 L640,228 L820,206 L1000,230 L1200,210 L1200,300 L0,300 Z"
          fill="#3E6076" opacity="0.4"/>
    <!-- drifting mist band -->
    <g opacity="0.7">
      <rect x="-200" y="236" width="1600" height="60" fill="url(#mist)"/>
      <animateTransform attributeName="transform" type="translate" values="-40 0; 40 0; -40 0" dur="22s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    </g>
    <!-- ridge 2 -->
    <path d="M0,266 L220,244 L420,268 L620,240 L840,266 L1040,244 L1200,262 L1200,300 L0,300 Z"
          fill="#243F52" opacity="0.9"/>
    <!-- ridge 1: front, darkest -->
    <path d="M0,300 L0,284 L200,266 L470,290 L700,262 L940,288 L1160,266 L1200,276 L1200,300 Z"
          fill="#152834"/>

    <!-- title block, lower-left -->
    <rect x="82" y="116" width="54" height="4" rx="2" fill="#C79A5E"/>
    <text x="80" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="#F3ECDB" letter-spacing="1">drift</text>
    <text x="84" y="204" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#A9C5D6" letter-spacing="3.5">COMMENT &amp; DOC ROT DETECTION · FOR CLAUDE CODE</text>
    <text x="84" y="230" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic" fill="#C79A5E" letter-spacing="0.4">catch the comments that lie.</text>
  </g>
</svg>
